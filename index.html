<!DOCTYPE html>
<html>
<head>
    <title>Private Live Stream</title>
    <style>
        body { 
            background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 90%; max-width: 450px;
        }
        input { 
            padding: 12px; border-radius: 8px; border: none; width: 80%; 
            background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px; 
        }
        video, img { width: 100%; border-radius: 12px; border: 2px solid #3b82f6; margin-top: 15px; }
        button { 
            padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; 
            font-weight: bold; transition: 0.3s; margin: 5px;
        }
        .btn-live { background: #ef4444; color: white; }
        .btn-watch { background: #3b82f6; color: white; }
        #status { color: #94a3b8; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="glass">
        <h2>Live Stream Studio</h2>
        <input type="password" id="passInput" placeholder="Enter Password (abc123)">
        
        <div class="controls">
            <button class="btn-live" onclick="init('stream')">Go Live</button>
            <button class="btn-watch" onclick="init('watch')">Watch</button>
        </div>

        <video id="video" autoplay playsinline style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="viewer" style="display:none;" alt="Live Feed">
        
        <p id="status">Status: Waiting for action...</p>
    </div>

    <script>
        // Paste your Apps Script URL below once
        const SCRIPT_URL = "YOUR_DEPLOYED_URL_HERE"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        async function init(mode) {
            const pass = document.getElementById('passInput').value;
            if (pass !== "abc123") return alert("Wrong Password!");

            if (mode === 'stream') {
                startBroadcasting(pass);
            } else {
                startWatching(pass);
            }
        }

        async function startBroadcasting(pass) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = "block";
                status.innerText = "Broadcasting Live...";
                
                const context = canvas.getContext('2d');
                setInterval(() => {
                    canvas.width = 320; 
                    canvas.height = 240;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.4);
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ password: pass, image: base64 })
                    });
                }, 800); // 0.8 sec interval for stability
            } catch (e) { alert("Camera not found!"); }
        }

        function startWatching(pass) {
            viewer.style.display = "block";
            status.innerText = "Fetching Live Feed...";
            
            setInterval(async () => {
                try {
                    const res = await fetch(`${SCRIPT_URL}?pass=${pass}`);
                    const data = await res.text();
                    if (data && data !== "Unauthorized") {
                        viewer.src = data;
                    }
                } catch (e) { console.log("Connecting..."); }
            }, 800);
        }
    </script>
</body>
</html>
