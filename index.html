<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Private Live Stream</title>
    <style>
        /* Glassmorphism Design */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .glass-panel { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; 
            width: 90%; 
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; }

        input { 
            padding: 12px; 
            border-radius: 12px; 
            border: none; 
            width: 85%; 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            margin-bottom: 20px; 
            outline: none;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

        button { 
            padding: 12px 25px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-live { background: #ef4444; color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-watch { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        video, img { 
            width: 100%; 
            border-radius: 16px; 
            border: 2px solid rgba(59, 130, 246, 0.5); 
            margin-top: 10px;
            display: none;
            background: #000;
        }

        #status { color: #94a3b8; font-size: 0.85rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>Live Stream</h2>
        <input type="password" id="passInput" placeholder="Enter Password (abc123)">
        
        <div class="controls">
            <button class="btn-live" onclick="init('stream')">Go Live</button>
            <button class="btn-watch" onclick="init('watch')">Watch</button>
        </div>

        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="viewer" alt="Waiting for feed...">
        
        <p id="status">Ready</p>
    </div>

    <script>
        // Apnar deya URL ekhane set kora holo
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoP8-zoB6q9PGw_dFOj53QI0IgWXVIK7ECnaG9ySF14VhqQcaXxjBqRA_8VODJWNAZIQ/exec"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        async function init(mode) {
            const pass = document.getElementById('passInput').value;
            if (pass !== "abc123") {
                alert("Wrong Password!");
                return;
            }

            if (mode === 'stream') {
                startBroadcasting(pass);
            } else {
                startWatching(pass);
            }
        }

        async function startBroadcasting(pass) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                video.style.display = "block";
                viewer.style.display = "none";
                status.innerText = "Broadcasting Live...";
                
                const context = canvas.getContext('2d');
                
                // Frequency set to 800ms for stability on GAS
                setInterval(() => {
                    canvas.width = 320; 
                    canvas.height = 240;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Compress image to save bandwidth
                    const base64 = canvas.toDataURL('image/jpeg', 0.3);
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ password: pass, image: base64 })
                    });
                }, 800); 
            } catch (e) {
                alert("Camera access denied or not found!");
                status.innerText = "Error: Camera not found";
            }
        }

        function startWatching(pass) {
            video.style.display = "none";
            viewer.style.display = "block";
            status.innerText = "Fetching Live Feed...";
            
            setInterval(async () => {
                try {
                    const res = await fetch(`${SCRIPT_URL}?pass=${pass}`);
                    const data = await res.text();
                    
                    if (data && data !== "Unauthorized" && data.startsWith("data:image")) {
                        viewer.src = data;
                        status.innerText = "Live Now";
                    }
                } catch (e) {
                    status.innerText = "Connecting to host...";
                }
            }, 800);
        }
    </script>
</body>
</html>
