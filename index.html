
<!DOCTYPE html>
<html lang="en">
<head><script type="text/javascript" src="/___vscode_livepreview_injected_script"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Mega Live Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --deep-blue: #020617;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0; padding: 20px;
            background: radial-gradient(circle at center, #1e293b, #020617);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); margin: 5px 0; }

        /* Main Video Section - MUCH BIGGER */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .video-card {
            background: #000;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        /* Controls Overlay */
        .video-controls {
            position: absolute;
            bottom: 10px; right: 10px;
            display: flex; gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px; border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .control-btn {
            background: var(--gold); color: #000;
            border: none; padding: 5px 10px; font-size: 12px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        /* Input Panel */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 500px; text-align: center;
        }

        input {
            width: 80%; padding: 12px; border-radius: 10px;
            border: 1px solid var(--gold); background: rgba(0,0,0,0.5);
            color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 15px;
        }

        .action-btns { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 12px 25px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-host { background: linear-gradient(to right, #b45309, #d97706); color: white; }
        .btn-watch { background: linear-gradient(to right, #1d4ed8, #3b82f6); color: white; }
        
        #status { margin-top: 15px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌙 Eid Mubarak Live</h1>
        <p>Celebrate Together, Anywhere</p>
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="video-card" id="card-1">
            <video id="v1" autoplay playsinline></video>
            <div class="video-controls">
                <button class="control-btn" onclick="toggleFS('v1')">Fullscreen</button>
                <button class="control-btn" onclick="togglePiP('v1')">Playback (PiP)</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <input type="text" id="roomID" placeholder="Room ID (3 Letters)" maxlength="3">
        <div class="action-btns">
            <button class="btn btn-host" onclick="startHost()">Start Live</button>
            <button class="btn btn-watch" onclick="joinLive()">Join Live</button>
        </div>
        <p id="status">Status: Offline</p>
        <button class="control-btn" style="margin-top:10px;" onclick="addVideoSlot()">+ Add Multi-View Slot</button>
    </div>

    <script>
        let peer;
        let myStream;
        const status = document.getElementById('status');

        // Function: Fullscreen Mode
        function toggleFS(id) {
            const v = document.getElementById(id);
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        }

        // Function: Playback / Picture-in-Picture Mode
        async function togglePiP(id) {
            const v = document.getElementById(id);
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await v.requestPictureInPicture();
                }
            } catch (e) { alert("Playback mode not supported on this browser."); }
        }

        // Function: Multiple Video Slots
        let slotCount = 1;
        function addVideoSlot() {
            slotCount++;
            const grid = document.getElementById('videoGrid');
            const newCard = document.createElement('div');
            newCard.className = 'video-card';
            newCard.id = `card-${slotCount}`;
            newCard.innerHTML = `
                <video id="v${slotCount}" autoplay playsinline></video>
                <div class="video-controls">
                    <button class="control-btn" onclick="toggleFS('v${slotCount}')">FS</button>
                    <button class="control-btn" onclick="togglePiP('v${slotCount}')">PiP</button>
                    <button class="control-btn" style="background:red; color:white;" onclick="removeSlot('card-${slotCount}')">X</button>
                </div>
            `;
            grid.appendChild(newCard);
        }

        function removeSlot(id) { document.getElementById(id).remove(); }

        // Core PeerJS Logic
        async function startHost() {
            const id = document.getElementById('roomID').value;
            if(id.length !== 3) return alert("Enter 3-letter ID");

            peer = new Peer(id);
            peer.on('open', async () => {
                status.innerText = "LIVE: ID is " + id;
                myStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('v1').srcObject = myStream;
                document.getElementById('v1').muted = true;
            });

            peer.on('call', call => call.answer(myStream));
        }

        function joinLive() {
            const id = document.getElementById('roomID').value;
            if(!peer) peer = new Peer();

            const call = peer.call(id, null);
            call.on('stream', stream => {
                // Find first empty video tag to play
                const videos = document.querySelectorAll('video');
                for(let v of videos) {
                    if(!v.srcObject) {
                        v.srcObject = stream;
                        status.innerText = "Connected to Live!";
                        break;
                    }
                }
            });
        }
    </script>
</body>
</html>
