<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Letter Live Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Glassmorphism UI */
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif;
            background: #0f172a; color: #f8fafc;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 2rem; width: 90%; max-width: 500px; text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .video-box {
            width: 100%; background: #000; border-radius: 12px;
            margin: 20px 0; border: 2px solid #3b82f6; overflow: hidden;
        }
        video { width: 100%; display: block; }
        input {
            padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; width: 80%; margin-bottom: 10px; text-align: center;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button {
            padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .btn-start { background: #22c55e; color: white; }
        .btn-watch { background: #3b82f6; color: white; }
        #status { font-size: 0.85rem; color: #94a3b8; margin-top: 15px; }
        .my-id-tag { color: #f59e0b; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>Live Stream (P2P)</h2>
        
        <p>Set/Enter your 3-letter ID:</p>
        <input type="text" id="my-custom-id" placeholder="e.g. 123" maxlength="3">
        
        <div class="btn-group">
            <button class="btn-start" onclick="connectAsHost()">1. Start Host</button>
        </div>

        <div class="video-box">
            <video id="main-video" autoplay playsinline></video>
        </div>

        <hr style="width:100%; border:0.5px solid rgba(255,255,255,0.1); margin:20px 0;">

        <p>Watch someone else:</p>
        <input type="text" id="remote-id-input" placeholder="Enter Host's 3-letter ID" maxlength="3">
        <div class="btn-group">
            <button class="btn-watch" onclick="joinStream()">2. Watch Live</button>
        </div>

        <p id="status">Status: Offline</p>
    </div>

    <script>
        let peer;
        let localStream;
        const mainVideo = document.getElementById('main-video');
        const statusText = document.getElementById('status');

        // Host hisebe connect kora
        async function connectAsHost() {
            const customId = document.getElementById('my-custom-id').value;
            if (customId.length !== 3) return alert("Please enter exactly 3 letters/numbers!");

            // Puraton connection thakle bondho kora
            if(peer) peer.destroy();

            // Noutun ID diye Peer initialize kora
            peer = new Peer(customId);

            peer.on('open', async (id) => {
                statusText.innerText = "Host Ready! ID: " + id;
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    mainVideo.srcObject = localStream;
                    mainVideo.muted = true;
                } catch (e) { alert("Camera access required!"); }
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                statusText.innerText = "Connection active! Someone is watching.";
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') {
                    alert("This ID is already taken! Try another 3 letters.");
                } else {
                    console.error(err);
                }
            });
        }

        // Viewer hisebe join kora
        function joinStream() {
            const hostId = document.getElementById('remote-id-input').value;
            if (hostId.length !== 3) return alert("Enter a valid 3-letter Host ID");

            // Viewer-er nijaswo random ID (ID conflict echanor jonno)
            if(!peer) peer = new Peer(); 

            statusText.innerText = "Connecting to " + hostId + "...";
            const call = peer.call(hostId, null); 
            
            call.on('stream', (remoteStream) => {
                mainVideo.srcObject = remoteStream;
                mainVideo.muted = false;
                statusText.innerText = "Watching Live Stream (Smooth)";
            });
        }
    </script>
</body>
</html>
