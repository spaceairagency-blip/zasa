<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Live Grid</title>
    <style>
        :root { --gold: #fbbf24; --emerald: #064e3b; --dark: #022c22; }
        
        body { 
            background: radial-gradient(circle, var(--emerald), var(--dark));
            color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .header h1 { color: var(--gold); text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin: 10px 0; }

        /* THE GRID - Supports Multiple Playbacks */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        .video-card {
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 15px;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        video, .viewer-img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Fullscreen & Label Overlays */
        .overlay-label {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.6); padding: 4px 10px;
            border-radius: 5px; font-size: 0.8rem; border: 1px solid var(--gold);
        }

        .fs-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--gold); color: var(--dark);
            border: none; padding: 5px 12px; border-radius: 5px;
            font-weight: bold; cursor: pointer; z-index: 10;
        }

        /* CONTROLS */
        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px;
            width: 90%; max-width: 500px; text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        input {
            width: 90%; padding: 12px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid var(--gold);
            background: #000; color: var(--gold); text-align: center;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            padding: 12px; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        .btn-watch { background: #2563eb; color: white; }
        .btn-stream { background: #dc2626; color: white; }
        .btn-cam { background: var(--gold); color: var(--dark); grid-column: span 2; margin-top: 10px;}

        button:active { transform: scale(0.95); }
        #status { margin-top: 10px; color: var(--gold); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌙 Eid Family Live</h1>
        <div id="status">Waiting to Connect...</div>
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="video-card" id="mainCard">
            <div class="overlay-label" id="streamLabel">Live Feed</div>
            <video id="localVideo" autoplay playsinline muted style="display:none;"></video>
            <img id="remoteViewer" class="viewer-img" src="" alt="Waiting for stream...">
            <button class="fs-btn" onclick="goFullscreen('mainCard')">⛶ Fullscreen</button>
        </div>
    </div>

    <div class="controls">
        <input type="password" id="passInput" placeholder="Enter Celebration Code">
        
        <div class="btn-row">
            <button class="btn-watch" onclick="startAction('watch')">📺 WATCH LIVE</button>
            <button class="btn-stream" onclick="startAction('stream')">📽️ GO LIVE</button>
            <button class="btn-cam" onclick="toggleCamera()">🔄 SWITCH CAMERA (FRONT/BACK)</button>
        </div>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoP8-zoB6q9PGw_dFOj53QI0IgWXVIK7ECnaG9ySF14VhqQcaXxjBqRA_8VODJWNAZIQ/exec";
        let currentFacingMode = "user"; // "user" or "environment"
        let streamInterval;

        async function startAction(mode) {
            const pass = document.getElementById('passInput').value;
            if(!pass) return alert("Please enter the password!");

            if(mode === 'stream') {
                setupStreaming(pass);
            } else {
                setupWatching(pass);
            }
        }

        async function setupStreaming(pass) {
            const video = document.getElementById('localVideo');
            const viewer = document.getElementById('remoteViewer');
            
            // UI Toggle
            video.style.display = "block";
            viewer.style.display = "none";
            document.getElementById('streamLabel').innerText = "🔴 Broadcasting";

            if (window.localStream) {
                window.localStream.getTracks().forEach(track => track.stop());
            }

            try {
                window.localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = window.localStream;

                const canvas = document.getElementById('hiddenCanvas');
                const ctx = canvas.getContext('2d');

                if(streamInterval) clearInterval(streamInterval);
                
                streamInterval = setInterval(() => {
                    canvas.width = 480; // Optimized size for GAS speed
                    canvas.height = 360;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64Data = canvas.toDataURL('image/jpeg', 0.4);
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ password: pass, image: base64Data })
                    });
                }, 1000);
                
                document.getElementById('status').innerText = "Live Broadcaster Active";
            } catch (err) {
                alert("Camera Access Error: " + err);
            }
        }

        function setupWatching(pass) {
            document.getElementById('localVideo').style.display = "none";
            const viewer = document.getElementById('remoteViewer');
            viewer.style.display = "block";
            document.getElementById('streamLabel').innerText = "📺 Watching Live";

            setInterval(async () => {
                try {
                    const response = await fetch(`${SCRIPT_URL}?pass=${pass}`);
                    const data = await response.text();
                    if(data.startsWith("data:image")) {
                        viewer.src = data;
                        document.getElementById('status').innerText = "Connected to Home Feed";
                    }
                } catch(e) {
                    document.getElementById('status').innerText = "Searching for Signal...";
                }
            }, 1000);
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            const pass = document.getElementById('passInput').value;
            if(pass && document.getElementById('localVideo').style.display === "block") {
                setupStreaming(pass);
            } else {
                alert("Camera switched! Start Stream to see it.");
            }
        }

        function goFullscreen(id) {
            const element = document.getElementById(id);
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
