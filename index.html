<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Live Feed</title>
    <style>
        :root { --gold: #fbbf24; --emerald: #064e3b; --dark: #022c22; }
        
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: var(--gold); margin: 5px 0; font-size: 1.8rem; }

        /* THE VIDEO BOX - NOW LARGE */
        .main-display {
            width: 100%;
            max-width: 900px;
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 15px;
            position: relative;
            aspect-ratio: 16 / 9; /* Professional Widescreen */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video, #viewer {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Shows full camera frame */
            display: none;
        }

        /* FULLSCREEN BUTTON ON VIDEO */
        .fs-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--gold);
            font-size: 0.8rem;
            z-index: 10;
        }

        /* CONTROL PANEL */
        .setup-box {
            width: 100%;
            max-width: 900px;
            margin-top: 15px;
            background: rgba(6, 78, 59, 0.4);
            padding: 20px;
            border-radius: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: #000;
            color: var(--gold);
            font-size: 1rem;
            text-align: center;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        /* WATCH BUTTON - Blue/Gold for contrast */
        .btn-watch { background: #1d4ed8; color: white; }
        .btn-stream { background: #b91c1c; color: white; }
        .btn-camera { background: var(--gold); color: var(--emerald); grid-column: span 2; }

        button:active { transform: scale(0.95); }

        #status { margin-top: 10px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌙 Eid Live View</h1>
        <div id="status">Ready to connect</div>
    </div>

    <div class="main-display" id="videoContainer">
        <div class="fs-badge" onclick="toggleFS()">⛶ Fullscreen</div>
        <video id="video" autoplay playsinline muted></video>
        <img id="viewer" src="" alt="Waiting for Family...">
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="setup-box">
        <input type="password" id="passInput" placeholder="Enter Code (abc123)">
        
        <div class="btn-group">
            <button class="btn-watch" onclick="init('watch')">📺 JOIN & WATCH</button>
            <button class="btn-stream" onclick="init('stream')">📽️ START STREAM</button>
            <button class="btn-camera" onclick="switchCam()">🔄 SWITCH TO BACK CAMERA</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoP8-zoB6q9PGw_dFOj53QI0IgWXVIK7ECnaG9ySF14VhqQcaXxjBqRA_8VODJWNAZIQ/exec";
        let useBack = false;
        let activeStream = null;

        async function init(mode) {
            const pass = document.getElementById('passInput').value;
            if(!pass) return alert("Please enter the password!");

            if(mode === 'stream') {
                document.getElementById('viewer').style.display = "none";
                document.getElementById('video').style.display = "block";
                startStreaming(pass);
            } else {
                document.getElementById('video').style.display = "none";
                document.getElementById('viewer').style.display = "block";
                startWatching(pass);
            }
        }

        async function startStreaming(pass) {
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
            
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useBack ? "environment" : "user" }
                });
                const videoEl = document.getElementById('video');
                videoEl.srcObject = activeStream;
                document.getElementById('status').innerText = "🔴 YOU ARE BROADCASTING";

                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');

                setInterval(() => {
                    canvas.width = 640; 
                    canvas.height = 480;
                    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                    const imgData = canvas.toDataURL('image/jpeg', 0.4);
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ password: pass, image: imgData })
                    });
                }, 1000);
            } catch(e) { alert("Camera Error!"); }
        }

        function startWatching(pass) {
            document.getElementById('status').innerText = "⌛ Connecting to Family Feed...";
            const viewer = document.getElementById('viewer');
            
            setInterval(async () => {
                try {
                    const r = await fetch(`${SCRIPT_URL}?pass=${pass}`);
                    const data = await r.text();
                    if(data.startsWith("data:image")) {
                        viewer.src = data;
                        document.getElementById('status').innerText = "🔴 LIVE FROM HOME";
                    }
                } catch(e) { }
            }, 1000);
        }

        function switchCam() {
            useBack = !useBack;
            const pass = document.getElementById('passInput').value;
            if(pass) init('stream');
            document.getElementById('status').innerText = "Switching Camera...";
        }

        function toggleFS() {
            const el = document.getElementById('videoContainer');
            if (!document.fullscreenElement) {
                el.requestFullscreen().catch(err => alert("Error enabling fullscreen"));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
