<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Eid Mubarak Live Stream</title>
    <style>
        /* Festive Eid Theme */
        body { 
            background: radial-gradient(circle at center, #064e3b, #022c22); 
            color: #fef3c7; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        /* Decorative background elements */
        body::before {
            content: "🌙";
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 3rem;
            opacity: 0.2;
        }

        .glass-panel { 
            background: rgba(6, 78, 59, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(251, 191, 36, 0.3);
            text-align: center; 
            width: 90%; 
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(251, 191, 36, 0.1);
            position: relative;
        }

        h2 { 
            margin-bottom: 5px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #d1fae5;
            margin-bottom: 25px;
            font-style: italic;
        }

        input { 
            padding: 14px; 
            border-radius: 15px; 
            border: 1px solid rgba(251, 191, 36, 0.3); 
            width: 85%; 
            background: rgba(0, 0, 0, 0.2); 
            color: #fbbf24; 
            margin-bottom: 20px; 
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        input::placeholder { color: rgba(251, 191, 36, 0.5); }

        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }

        button { 
            padding: 12px 30px; 
            border-radius: 50px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-live { 
            background: linear-gradient(135deg, #b91c1c, #7f1d1d); 
            color: white; 
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.4); 
        }

        .btn-watch { 
            background: linear-gradient(135deg, #d97706, #92400e); 
            color: white; 
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4); 
        }

        button:hover { 
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        video, img { 
            width: 100%; 
            border-radius: 20px; 
            border: 3px solid #fbbf24; 
            margin-top: 15px;
            display: none;
            background: #064e3b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        #status { 
            color: #fbbf24; 
            font-size: 0.9rem; 
            margin-top: 20px; 
            font-weight: 500;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>🌙 Eid Mubarak</h2>
        <p class="subtitle">Join the Family Celebration Live</p>
        
        <input type="password" id="passInput" placeholder="Enter Secret Code">
        
        <div class="controls">
            <button class="btn-live" onclick="init('stream')">Start Stream</button>
            <button class="btn-watch" onclick="init('watch')">Join Celebration</button>
        </div>

        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="viewer" alt="Waiting for the host to start...">
        
        <p id="status">Ready to connect</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoP8-zoB6q9PGw_dFOj53QI0IgWXVIK7ECnaG9ySF14VhqQcaXxjBqRA_8VODJWNAZIQ/exec"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const viewer = document.getElementById('viewer');
        const status = document.getElementById('status');

        async function init(mode) {
            const pass = document.getElementById('passInput').value;
            if (!pass) {
                alert("Please enter the password first!");
                return;
            }

            if (mode === 'stream') {
                startBroadcasting(pass);
            } else {
                startWatching(pass);
            }
        }

        async function startBroadcasting(pass) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                video.style.display = "block";
                viewer.style.display = "none";
                status.innerText = "✨ You are Live!";
                
                const context = canvas.getContext('2d');
                
                setInterval(() => {
                    canvas.width = 320; 
                    canvas.height = 240;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.3);
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ password: pass, image: base64 })
                    });
                }, 800); 
            } catch (e) {
                alert("Camera access denied!");
                status.innerText = "Error: Camera not found";
            }
        }

        function startWatching(pass) {
            video.style.display = "none";
            viewer.style.display = "block";
            status.innerText = "Connecting to the celebration...";
            
            setInterval(async () => {
                try {
                    const res = await fetch(`${SCRIPT_URL}?pass=${pass}`);
                    const data = await res.text();
                    
                    if (data && data !== "Unauthorized" && data.startsWith("data:image")) {
                        viewer.src = data;
                        status.innerText = "🔴 Live Now";
                    } else if (data === "Unauthorized") {
                        status.innerText = "Incorrect Password";
                    }
                } catch (e) {
                    status.innerText = "Waiting for host...";
                }
            }, 800);
        }
    </script>
</body>
</html>
