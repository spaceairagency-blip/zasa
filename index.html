<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed P2P Live</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 { margin-top: 0; color: #3b82f6; }

        .video-container {
            position: relative;
            width: 100%;
            margin: 20px 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #1e293b;
        }

        video {
            width: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .id-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            color: #22c55e;
            border: 1px dashed #22c55e;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            outline: none;
        }

        .btn-group { display: flex; gap: 10px; justify-content: center; }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #22c55e; color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        #status { font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>P2P Smooth Stream</h2>
        
        <div class="id-display">
            Your Live ID: <span id="my-id">Generating...</span>
        </div>

        <div class="video-container">
            <video id="main-video" autoplay playsinline></video>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button class="btn-success" onclick="startCamera()">1. Open Camera</button>
            </div>
            
            <input type="text" id="remote-id-input" placeholder="Paste Host ID here to watch">
            
            <div class="btn-group">
                <button class="btn-primary" onclick="joinStream()">2. Watch Live</button>
            </div>
        </div>

        <p id="status">Status: Waiting for Peer connection...</p>
    </div>

    <script>
        const peer = new Peer(); // PeerJS connection
        let localStream;
        const mainVideo = document.getElementById('main-video');
        const statusText = document.getElementById('status');
        const myIdDisplay = document.getElementById('my-id');

        // Step 1: Peer ID generate hole screen-e dekhano
        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            statusText.innerText = "Connection Ready. Share your ID.";
        });

        // Broadcaster: Camera open kora
        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { frameRate: { ideal: 30 }, width: 640 }, 
                    audio: true 
                });
                mainVideo.srcObject = localStream;
                mainVideo.muted = true; // Broadcaster nije nijer awaj shuna dorkar nai
                statusText.innerText = "Camera Active. Others can now call you.";
            } catch (err) {
                alert("Camera access dite hobe!");
            }
        }

        // Broadcaster: Keu call korle video pathano
        peer.on('call', (call) => {
            if (localStream) {
                statusText.innerText = "Someone is watching your live!";
                call.answer(localStream); // Send my camera stream to them
            } else {
                alert("Open your camera first!");
            }
        });

        // Viewer: Host ID diye join kora
        function joinStream() {
            const hostId = document.getElementById('remote-id-input').value;
            if (!hostId) return alert("Please enter a Host ID");

            statusText.innerText = "Connecting to Host...";
            
            // Host-ke call kora (kichu na pathiyei)
            const call = peer.call(hostId, null); 
            
            call.on('stream', (remoteStream) => {
                mainVideo.srcObject = remoteStream;
                mainVideo.muted = false; // Live-er awaj shunte pabe
                statusText.innerText = "Watching Live Stream (30FPS)";
            });

            call.on('error', (err) => {
                statusText.innerText = "Connection failed!";
                console.error(err);
            });
        }
    </script>
</body>
</html>
